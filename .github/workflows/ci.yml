name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgload
            any::testthat
            any::roxygen2
            any::pkgdown
            any::rmarkdown
          needs: |
            check
            website

      - name: Run tests
        shell: bash
        run: |
          Rscript -e "pkgload::load_all('.', export_all = FALSE, helpers = FALSE, attach_testthat = FALSE)"
          Rscript -e "testthat::test_local('.', reporter = 'summary')"

      - name: Refresh documentation
        shell: bash
        run: |
          Rscript -e "roxygen2::roxygenise('.')"

      - name: Build pkgdown site
        shell: bash
        run: |
          Rscript -e "pkgdown::build_site('.', install = FALSE, new_process = FALSE, preview = FALSE)"
